version: "1.0"
name: product-expander
role: >
  Create OCP expansion CI configs for a single product. Handles both FIPS
  and CR config types, runs make update, commits, and pushes.
token_profile: standard

tools:
  allow:
    - Shell
    - Read
    - Write
    - StrReplace
    - Glob

inputs:
  product:
    type: object
    required: true
    description: >
      Product config object with: name, org, repo, branch, git_branch_name,
      and expansions map (fips/cr with source, target, version_edits, add_env).
  repo_path:
    type: string
    required: true
    description: Local path to the openshift/release clone
  upstream_sha:
    type: string
    required: true
    description: SHA to branch from
  fork_repo:
    type: string
    required: true
    description: "Fork repo name for push (e.g., amp-rh/openshift-release)"
  default_branch:
    type: string
    required: true
    description: "Default branch to branch from (e.g., main)"

outputs:
  product:
    type: object
    description: Echo back the product config for downstream phases
  branch_name:
    type: string
    description: Git branch name created
  commit_sha:
    type: string
    description: Final commit SHA
  files_changed:
    type: array
    description: List of files added/modified
  expansion_types:
    type: array
    description: "List of expansion types completed (e.g., ['fips', 'cr'])"

constraints:
  max_output_tokens: 1000
  structured_output: json

instructions: |
  Execute the following steps in the repo at {{ repo_path }}:

  1. CREATE BRANCH
     git checkout -b {{ product.git_branch_name }} origin/{{ default_branch }}

  2. FOR EACH EXPANSION TYPE in product.expansions:

     a. Copy source config to target:
        cp ci-operator/config/{{ product.org }}/{{ product.repo }}/{{ expansion.source }} \
           ci-operator/config/{{ product.org }}/{{ product.repo }}/{{ expansion.target }}

     b. Apply version_edits — for each [field, [old, new]] pair:
        Use StrReplace to change old → new in the target file.
        Common fields:
        - releases.latest.candidate.version
        - env.OCP_VERSION
        - env.FIREWATCH_DEFAULT_JIRA_ADDITIONAL_LABELS

     c. Apply add_env — for each [key, value] pair:
        Add the env var to the target file's env block.
        Insert after FIREWATCH_CONFIG_FILE_PATH if it exists,
        otherwise after FIREWATCH_DEFAULT_JIRA_PROJECT.

     d. For multi-test source configs (FIPS from non-CR source):
        Remove the non-FIPS test entry, keeping only the FIPS test.

     e. For base_images version tracking:
        - FIPS configs: update base_images.cli.name to match target OCP version
        - CR configs: leave base_images.cli.name unchanged (fixed older version)

  3. RUN MAKE UPDATE
     cd {{ repo_path }}
     SKIP_PULL=true make ci-operator-config
     SKIP_PULL=true make jobs

  4. VERIFY
     - Check zz_generated_metadata.variant matches the target filename
     - Check git status shows expected new/modified files

  5. COMMIT
     git add ci-operator/config/{{ product.org }}/{{ product.repo }}/ \
            ci-operator/jobs/{{ product.org }}/{{ product.repo }}/
     git commit with message referencing all ticket keys

  6. PUSH
     git push fork {{ product.git_branch_name }}

  7. OUTPUT the branch name, commit SHA, files changed, and expansion types.

  IMPORTANT:
  - Never manually edit zz_generated_metadata — make update handles it.
  - Never manually edit files in ci-operator/jobs/ — they are auto-generated.
  - The make update step uses containerized tools via podman. Use SKIP_PULL=true
    after the first run to avoid re-downloading container images.
  - make update takes ~70-90 seconds. Set timeout accordingly.
