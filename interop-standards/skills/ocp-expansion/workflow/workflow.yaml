version: "1.0"
name: ocp-expansion
description: >
  Parallel OCP version expansion pipeline. Creates FIPS and CR CI configs
  for multiple products, runs make update, creates PRs, and updates Jira.

config:
  concurrency:
    max_parallel: 4
  repo:
    upstream: openshift/release
    default_branch: main

inputs:
  products:
    type: array
    required: true
    description: >
      Array of product config objects. See assets/product-config-example.yaml
      for schema.
  fork_owner:
    type: string
    required: true
    description: GitHub username that owns the fork
  repo_path:
    type: string
    required: true
    description: Local path to the openshift/release clone
  dry_run:
    type: boolean
    default: false

phases:
  - name: setup_repo
    subagent: repo-setup
    inputs:
      fork_owner: "{{ inputs.fork_owner }}"
      repo_path: "{{ inputs.repo_path }}"
      upstream: "{{ config.repo.upstream }}"
      default_branch: "{{ config.repo.default_branch }}"
    outputs:
      repo_path: { type: string }
      upstream_sha: { type: string }
      fork_repo: { type: string }

  - name: expand_products
    for_each: "{{ inputs.products }}"
    as: product
    max_parallel: "{{ config.concurrency.max_parallel }}"
    subagent: product-expander
    inputs:
      product: "{{ product }}"
      repo_path: "{{ phases.setup_repo.outputs.repo_path }}"
      upstream_sha: "{{ phases.setup_repo.outputs.upstream_sha }}"
      fork_repo: "{{ phases.setup_repo.outputs.fork_repo }}"
      default_branch: "{{ config.repo.default_branch }}"
    outputs:
      branch_name: { type: string }
      commit_sha: { type: string }
      files_changed: { type: array }
      expansion_types: { type: array }

  - name: create_prs
    condition: "{{ not inputs.dry_run }}"
    for_each: "{{ phases.expand_products.outputs }}"
    as: expanded
    max_parallel: "{{ config.concurrency.max_parallel }}"
    subagent: pr-lifecycle
    inputs:
      product: "{{ expanded.product }}"
      branch_name: "{{ expanded.branch_name }}"
      fork_repo: "{{ phases.setup_repo.outputs.fork_repo }}"
      upstream: "{{ config.repo.upstream }}"
      default_branch: "{{ config.repo.default_branch }}"
      expansion_types: "{{ expanded.expansion_types }}"
    outputs:
      pr_url: { type: string }
      pr_number: { type: number }
      jira_comments: { type: array }

outputs:
  summary:
    products_processed: "{{ phases.expand_products.outputs | length }}"
    prs_created: "{{ phases.create_prs.outputs | length }}"
    prs: "{{ phases.create_prs.outputs | map(attribute='pr_url') }}"

on_error:
  strategy: continue
  collect_errors: true
