# Product Config Schema for OCP Expansion Workflow
#
# This file defines the input format for the ocp-expansion workflow.
# Each product entry describes the source configs, target configs,
# and version edits needed for both FIPS and CR expansions.
#
# Usage:
#   python -m executor cursor workflow/workflow.yaml \
#     --inputs '{"products": [...], "fork_owner": "amp-rh", "repo_path": "/path/to/release"}'

# Metadata (not consumed by workflow, for human reference)
ocp_source_version: "4.21"
ocp_target_version: "4.22"
epic: INTEROP-8881
tracking_sheet: https://docs.google.com/spreadsheets/d/1IT8rV8q9T4vZSBh8rFtcSufSq_LUMLDbq6aKCEUNAS8/edit

products:
  - name: acs
    display_name: ACS (Advanced Cluster Security / StackRox)
    org: stackrox
    repo: stackrox
    branch: master
    git_branch_name: acs_ocp_4.22
    epic: INTEROP-8881
    expansions:
      fips:
        ticket: INTEROP-8892
        source: stackrox-stackrox-master__ocp-4-21-lp-interop.yaml
        target: stackrox-stackrox-master__ocp-4-22-lp-interop-fips.yaml
        version_edits:
          - field: releases.latest.candidate.version
            old: "4.21"
            new: "4.22"
          - field: env.FIREWATCH_DEFAULT_JIRA_ADDITIONAL_LABELS
            old: "4.21-lp"
            new: "4.22-lp"
        add_env:
          FIREWATCH_FAIL_WITH_TEST_FAILURES: "true"
        firewatch:
          assignee: dahouse@redhat.com
          project: LPINTEROP
      cr:
        ticket: INTEROP-8899
        source: stackrox-stackrox-master__ocp-4.21-lp-interop-cr-acs-latest.yaml
        target: stackrox-stackrox-master__ocp-4.22-lp-interop-cr-acs-latest.yaml
        version_edits:
          - field: releases.latest.candidate.version
            old: "4.21"
            new: "4.22"
          - field: env.OCP_VERSION
            old: "4.21"
            new: "4.22"
          - field: env.FIREWATCH_DEFAULT_JIRA_ADDITIONAL_LABELS
            old: "4.21-lp-cr"
            new: "4.22-lp-cr"
        firewatch:
          assignee: dahouse@redhat.com
          project: ROX

  - name: gitops
    display_name: GitOps (Red Hat OpenShift GitOps)
    org: redhat-developer
    repo: gitops-operator
    branch: v1.19
    git_branch_name: gitops_ocp_4.22
    epic: INTEROP-8881
    # Product version bump: v1.16/v1.18 → v1.19
    preflight:
      verify_branch: v1.19
    expansions:
      fips:
        ticket: INTEROP-8896
        # Source is multi-test (FIPS + non-FIPS). Extract FIPS test only.
        source: redhat-developer-gitops-operator-v1.16__gitops-ocp4.20-lp-interop.yaml
        target: redhat-developer-gitops-operator-v1.19__gitops-ocp4.22-lp-interop-fips.yaml
        extract_test: redhat-openshift-gitops-interop-aws-fips
        version_edits:
          - field: base_images.cli.name
            old: "4.20"
            new: "4.22"
          - field: releases.latest.candidate.version
            old: "4.20"
            new: "4.22"
          - field: env.FIREWATCH_DEFAULT_JIRA_ADDITIONAL_LABELS
            old: "4.20-lp"
            new: "4.22-lp"
        add_env:
          FIREWATCH_FAIL_WITH_TEST_FAILURES: "true"
        firewatch:
          assignee: vab@redhat.com
          project: LPINTEROP
      cr:
        ticket: INTEROP-8900
        source: redhat-developer-gitops-operator-v1.18__gitops-ocp-4.21-lp-interop-cr.yaml
        target: redhat-developer-gitops-operator-v1.19__gitops-ocp-4.22-lp-interop-cr.yaml
        version_edits:
          - field: releases.latest.candidate.version
            old: "4.21"
            new: "4.22"
          - field: env.OCP_VERSION
            old: "4.21"
            new: "4.22"
          - field: env.FIREWATCH_DEFAULT_JIRA_ADDITIONAL_LABELS
            old: "4.21-lp"
            new: "4.22-lp"
        firewatch:
          assignee: vab@redhat.com
          project: GITOPS

# To add a new product, copy one of the entries above and update:
# 1. name, display_name, org, repo, branch
# 2. git_branch_name (used for the PR branch)
# 3. Each expansion's ticket, source, target, version_edits
# 4. firewatch assignee/project (verify from contacts spreadsheet)
# 5. preflight.verify_branch if product has a version bump
# 6. extract_test if FIPS source is a multi-test config
